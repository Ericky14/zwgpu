version: "3"

tasks:
  default:
    cmds:
      - go-task --list

  build:
    desc: Build the package
    cmds:
      - zig build

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf zig-out .zig-cache zig-cache

  fmt:
    desc: Format source files
    cmds:
      - zig fmt build.zig
